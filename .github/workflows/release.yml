# ============================================================
# HiveMind Release Pipeline
# Triggered on: version tag push (v*)
# Builds and pushes Docker images to GitHub Container Registry
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/hivemind

jobs:
  # ---- Build & Push Docker Images ----
  release:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ---- Build & Push Java Backend ----
      - name: Build & Push hivemind-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-app:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Build & Push Frontend ----
      - name: Build & Push hivemind-web
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Build & Push ReMe Server ----
      - name: Build & Push hivemind-reme
        uses: docker/build-push-action@v6
        with:
          context: ./reme-server
          file: ./reme-server/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-reme:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}-reme:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## 🚀 HiveMind ${{ steps.version.outputs.VERSION }} Released!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-app:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-web:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-reme:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Start" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker compose pull" >> $GITHUB_STEP_SUMMARY
          echo "docker compose up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
