# ============================================================
# HiveMind CI Pipeline
# Runs on: push to main/develop, pull requests to main
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Java Build & Test ----
  java-build:
    name: Java Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hivemind
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s

      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=20s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn clean verify -B
        env:
          LOCAL_MYSQL_PWD: root
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/hivemind?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          MONGODB_URI: mongodb://localhost:27017/hivemind

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ---- Frontend Build & Lint ----
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check & Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: website/dist/
          retention-days: 7

  # ---- Docker Build (verify Dockerfiles work) ----
  docker-build:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [java-build, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Java backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: hivemind-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile
          push: false
          tags: hivemind-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ReMe server image
        uses: docker/build-push-action@v6
        with:
          context: ./reme-server
          file: ./reme-server/docker/Dockerfile
          push: false
          tags: hivemind-reme:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
