<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="crimson-lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c42b3a"/>
      <stop offset="100%" stop-color="#8f212a"/>
    </linearGradient>
    <linearGradient id="gold-lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a832"/>
      <stop offset="100%" stop-color="#b8912d"/>
    </linearGradient>
    <radialGradient id="pulse-lg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a832" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#d4a832" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d4a832" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="inner-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e8455a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8f212a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background subtle glow -->
  <circle cx="60" cy="60" r="56" fill="url(#pulse-lg)" opacity="0.3"/>

  <!-- Outer hexagon — the hive cell -->
  <path d="M60 6 L104 31 L104 89 L60 114 L16 89 L16 31 Z"
        fill="url(#crimson-lg)" stroke="#b8912d" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Inner atmospheric glow -->
  <path d="M60 6 L104 31 L104 89 L60 114 L16 89 L16 31 Z"
        fill="url(#inner-glow)"/>

  <!-- Inner hexagon — second layer -->
  <path d="M60 20 L93 38 L93 82 L60 100 L27 82 L27 38 Z"
        fill="none" stroke="#b8912d" stroke-width="1" stroke-opacity="0.35" stroke-linejoin="round"/>

  <!-- Third hexagon — deepest layer -->
  <path d="M60 32 L82 45 L82 75 L60 88 L38 75 L38 45 Z"
        fill="none" stroke="#b8912d" stroke-width="0.6" stroke-opacity="0.2" stroke-linejoin="round"/>

  <!-- Neural pathways — radiating connections -->
  <!-- Center node glow -->
  <circle cx="60" cy="60" r="14" fill="url(#pulse-lg)"/>

  <!-- Central hub -->
  <circle cx="60" cy="60" r="6" fill="url(#gold-lg)"/>
  <circle cx="60" cy="60" r="3" fill="#e8c84a" opacity="0.8"/>

  <!-- Connection lines to 6 directions -->
  <!-- Up -->
  <line x1="60" y1="54" x2="60" y2="32" stroke="#d4a832" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="60" cy="30" r="3.5" fill="#d4a832"/>
  <circle cx="60" cy="30" r="1.5" fill="#e8c84a"/>

  <!-- Upper-right -->
  <line x1="65" y1="57" x2="84" y2="44" stroke="#d4a832" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="85" cy="43" r="2.8" fill="#d4a832" opacity="0.85"/>
  <circle cx="85" cy="43" r="1.2" fill="#e8c84a" opacity="0.7"/>

  <!-- Lower-right -->
  <line x1="65" y1="63" x2="84" y2="76" stroke="#d4a832" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="85" cy="77" r="2.8" fill="#d4a832" opacity="0.85"/>
  <circle cx="85" cy="77" r="1.2" fill="#e8c84a" opacity="0.7"/>

  <!-- Down -->
  <line x1="60" y1="66" x2="60" y2="88" stroke="#d4a832" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="60" cy="90" r="3.5" fill="#d4a832"/>
  <circle cx="60" cy="90" r="1.5" fill="#e8c84a"/>

  <!-- Lower-left -->
  <line x1="55" y1="63" x2="36" y2="76" stroke="#d4a832" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="35" cy="77" r="2.8" fill="#d4a832" opacity="0.85"/>
  <circle cx="35" cy="77" r="1.2" fill="#e8c84a" opacity="0.7"/>

  <!-- Upper-left -->
  <line x1="55" y1="57" x2="36" y2="44" stroke="#d4a832" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="35" cy="43" r="2.8" fill="#d4a832" opacity="0.85"/>
  <circle cx="35" cy="43" r="1.2" fill="#e8c84a" opacity="0.7"/>

  <!-- Cross-connections between outer nodes (mesh/collaboration web) -->
  <line x1="35" y1="43" x2="60" y2="30" stroke="#d4a832" stroke-width="0.7" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="60" y1="30" x2="85" y2="43" stroke="#d4a832" stroke-width="0.7" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="85" y1="43" x2="85" y2="77" stroke="#d4a832" stroke-width="0.7" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="85" y1="77" x2="60" y2="90" stroke="#d4a832" stroke-width="0.7" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="60" y1="90" x2="35" y2="77" stroke="#d4a832" stroke-width="0.7" stroke-opacity="0.35" stroke-linecap="round"/>
  <line x1="35" y1="77" x2="35" y2="43" stroke="#d4a832" stroke-width="0.7" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Diagonal cross-connections (richer mesh) -->
  <line x1="35" y1="43" x2="85" y2="77" stroke="#d4a832" stroke-width="0.4" stroke-opacity="0.15" stroke-linecap="round"/>
  <line x1="85" y1="43" x2="35" y2="77" stroke="#d4a832" stroke-width="0.4" stroke-opacity="0.15" stroke-linecap="round"/>
  <line x1="60" y1="30" x2="60" y2="90" stroke="#d4a832" stroke-width="0.4" stroke-opacity="0.15" stroke-linecap="round"/>

  <!-- Active agent pulses — animated thinking dots -->
  <circle cx="46" cy="34" r="1.8" fill="#d4a832" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.4;2;1.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="74" cy="34" r="1.8" fill="#d4a832" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.4;2;1.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="46" cy="86" r="1.8" fill="#d4a832" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.4;2;1.4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="74" cy="86" r="1.8" fill="#d4a832" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.4;2;1.4" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle particle dots floating around -->
  <circle cx="28" cy="28" r="1" fill="#d4a832" opacity="0.25">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="92" cy="28" r="1" fill="#d4a832" opacity="0.25">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="92" r="1" fill="#d4a832" opacity="0.25">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="92" cy="92" r="1" fill="#d4a832" opacity="0.25">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>
