services:
  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8000:8000"

  reme:
    build: .
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      REME_WORKING_DIR: "/data/reme"
      REME_VECTOR_BACKEND: "chroma"
      REME_CHROMA_HOST: "chroma"
      REME_CHROMA_PORT: "8000"
      REME_CHROMA_COLLECTION: "reme"
      REME_AUTO_START: "1"
    ports:
      - "8090:8090"
    volumes:
      - reme_data:/data
    depends_on:
      - chroma

volumes:
  reme_data: