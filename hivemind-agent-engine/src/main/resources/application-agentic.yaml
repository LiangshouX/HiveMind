spring:
  application:
    name: hivemind-agent-engine
  mongodb:
    # Spring Boot 4.0 变更: MongoDB 基础连接属性前缀从 spring.data.mongodb 改为 spring.mongodb
    # 参考: https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-4.0-Configuration-Changelog
    uri: ${MONGODB_URI:mongodb://localhost:27017/hivemind}

tdagent:
  observability:
    enabled: false
    url: http://localhost:5174
  system-prompt:
    product-name: HiveMindAgent
    owner-name: HiveMind
    max-history-preview: 12
  model:
    provider-config-location: classpath:provider/builtin_provider.json
    reload-on-change: true
    provider-id: ${TDAGENT_MODEL_PROVIDER:dashscope}
    model-id: ${TDAGENT_MODEL_ID:qwen3-max}
    api-key: ${AI_DASHSCOPE_API_KEY:}
    base-url: ${TDAGENT_MODEL_BASE_URL:https://dashscope.aliyuncs.com}
    endpoint-path: ${TDAGENT_MODEL_ENDPOINT_PATH:}
    model-name: ${TDAGENT_MODEL_NAME:qwen-max}
    stream: true
    enable-thinking: true
    max-iters: 200
  sandbox:
    enabled: true
    browser-enabled: true
    filesystem-enabled: true
    strict-startup: false
  tool-guard:
    enabled: true
    strict-mode: true
    pending-expire-minutes: 60
  reme:
    enabled: true
    base-url: ${TDAGENT_REME_BASE_URL:http://localhost:8002}
    timeout-seconds: 60
    top-k: 5
  compaction:
    enabled: true
    trigger-mode: TOKEN
    context-window-size: 0
    threshold-ratio: 0.85
    output-reserve-tokens: 0
    head-ratio: 0.10
    min-messages-since-compaction: 3
    trigger-message-count: 20
    trigger-character-count: 24000
    keep-recent-messages: 6
    max-summary-characters: 2400
  streaming:
    enabled: true
    incremental: true
  skill:
    enabled: true
    builtin-location: classpath:skills
    builtin-enabled-by-default: true
    custom-enabled-by-default: true
    storage:
      oss:
        enabled: false
        accessKeyId: ""
        accessKeySecret: ""
